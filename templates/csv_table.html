{% extends "base.html" %}
{% block title %}CSV Viewer{% endblock %}
{% block content %}
<h1>Latest CSV Data</h1>
<table border="1" style="border-collapse: collapse; width: 100%;">
    {% for row in rows %}
    <tr>
        {% for cell in row %}
        <td style="padding: 8px; border: 1px solid #444;">{{ cell }}</td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>
<a href="/csv-view">Back to CSV List</a>
{% endblock %}
