{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block content %}
<h1><i class="fas fa-file-pdf"></i> Generated Reports</h1>

<div class="card" style="margin-bottom: 20px;">
    <div class="controls" style="margin-bottom: 20px;">
        <button onclick="generateReport()"><i class="fas fa-plus"></i> Generate New Report</button>
    </div>
    <ul id="reports-list">
        <!-- populated by JS -->
    </ul>
</div>
{% endblock %}

{% block scripts %}
<script>
async function fetchReportsList() {
    try {
        const response = await fetch('/api/reports/list');
        const files = await response.json();
        const ul = document.getElementById('reports-list');
        ul.innerHTML = '';
        files.forEach(f => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="/api/reports/download/${f}" download>${f}</a>`;
            ul.appendChild(li);
        });
    } catch (error) {
        console.error('Failed to fetch reports list:', error);
    }
}

function generateReport() {
    fetch('/api/report/generate', { method: 'POST' })
        .then(async response => {
            if (!response.ok) {
                const err = await response.json().catch(() => ({error: 'Failed to generate report'}));
                alert(err.error || 'Failed to generate report');
                throw new Error('API Error');
            }
            return response.blob();
        })
        .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'report.pdf';
            a.click();
            // Refresh list after a delay
            setTimeout(fetchReportsList, 2000);
        })
        .catch(error => console.error('Error generating report:', error));
}

fetchReportsList();
</script>
{% endblock %}
