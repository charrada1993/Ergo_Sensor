<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ergo Sensor - Sensor Status</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .sensor-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .sensor-table th, .sensor-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .sensor-table th {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
        }
        .status-online {
            color: #00ff00;
            font-weight: bold;
        }
        .status-offline {
            color: #ff4444;
            font-weight: bold;
        }

        /* Mobile Card View */
        .sensor-cards {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        
        .sensor-mobile-card {
            background: rgba(18, 20, 35, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-info h3 {
            font-size: 1rem;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .card-info p {
            font-size: 0.8rem;
            color: #8890aa;
        }

        @media (max-width: 768px) {
            .sensor-table {
                display: none;
            }
            .sensor-cards {
                display: flex;
            }
        }
    </style>
</head>
<body class="{% if session.get('theme') == 'light' %}light-mode{% endif %}">
    <div class="container">
        <!-- Reusing base navigation logic via JS/CSS if needed, but for now keeping it simple as it's a separate page -->
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
            <a href="/" style="color: #00d4ff; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Dash</a>
        </div>

        <h1>ESP32 Sensor Status</h1>
        
        <!-- Desktop Table -->
        <table class="sensor-table" id="sensorTable">
            <thead>
                <tr>
                    <th>Sensor ID</th>
                    <th>Placement</th>
                    <th>Last Data</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- Mobile Cards -->
        <div class="sensor-cards" id="sensorCards"></div>

        <p style="margin-top: 20px; color: #8890aa; font-size: 0.9rem;">Last updated: <span id="updateTime"></span></p>
    </div>

    <script>
        async function fetchSensorStatus() {
            try {
                const response = await fetch('/api/sensors');
                const sensors = await response.json();
                
                // Update Table
                const tbody = document.querySelector('#sensorTable tbody');
                tbody.innerHTML = '';
                
                // Update Cards
                const cardContainer = document.getElementById('sensorCards');
                cardContainer.innerHTML = '';

                sensors.forEach(s => {
                    const lastSeen = s.last_seen ? new Date(s.last_seen * 1000).toLocaleString() : 'Never';
                    const statusClass = s.online ? 'status-online' : 'status-offline';
                    const statusText = s.online ? 'Online' : 'Offline';
                    
                    // Table Row
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${s.sensor_id}</td>
                        <td>${s.sensor_id.replace('_', ' ')}</td>
                        <td>${lastSeen}</td>
                        <td class="${statusClass}">${statusText}</td>
                    `;
                    tbody.appendChild(row);

                    // Mobile Card
                    const card = document.createElement('div');
                    card.className = 'sensor-mobile-card';
                    card.innerHTML = `
                        <div class="card-info">
                            <h3>${s.sensor_id.replace('_', ' ')}</h3>
                            <p><i class="far fa-clock"></i> ${lastSeen}</p>
                        </div>
                        <div class="${statusClass}">${statusText}</div>
                    `;
                    cardContainer.appendChild(card);
                });
                
                document.getElementById('updateTime').innerText = new Date().toLocaleString();
            } catch (error) {
                console.error('Failed to fetch sensor status:', error);
            }
        }

        fetchSensorStatus();
        setInterval(fetchSensorStatus, 5000);
    </script>
</body>
</html>
